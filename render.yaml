databases:
  - name: recta2-db
    plan: free
    databaseName: recta2
    user: recta2

services:
  # Laravel API (private — only accessible from within Render)
  - type: web
    name: recta2-api
    plan: free
    runtime: docker
    dockerfilePath: ./docker/php.render.dockerfile
    dockerContext: .
    envVars:
      - key: APP_NAME
        value: Recta2
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        fromService:
          name: recta2-web
          type: web
          property: host
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: recta2-db
          property: connectionString
      - key: CACHE_STORE
        value: file
      - key: SESSION_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: GEMINI_API_KEY
        sync: false # Manual input in Render dashboard

  # React Router SSR (public-facing)
  - type: web
    name: recta2-web
    plan: free
    runtime: docker
    dockerfilePath: ./docker/node.render.dockerfile
    dockerContext: .
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_BASE_URL
        fromService:
          name: recta2-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
